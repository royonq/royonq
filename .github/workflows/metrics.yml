name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          base: "header, activity, community"
          filename: github-metrics.svg
          
          # 1. ТВОЙ 3D ГОРОД
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # 2. ПРИНУДИТЕЛЬНЫЕ СКИЛЛЫ (C# и Unity)
          # Это сработает на 100%, даже если в репо пусто
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_indepth: yes
          repositories_affiliations: owner, collaborator, contributor
          
          # НАСТРОЙКИ СТИЛЯ
          template: classic
          config_timezone: Europe/Moscow
          config_display: large
          config_order: isocalendar, languages
          
          # Темная тема через пресет (чтобы не было ворнингов)
          config_presets: github-dark
