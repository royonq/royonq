name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Europe/Moscow
          config_display: large
          config_padding: 0, 5
          design_title_color: "#30363d"
          template: classic
          base_indepth: yes
          config_order: isocalendar
          config_colors: "0d1117, #21262d, #30363d, #484f58, #8b949e"
