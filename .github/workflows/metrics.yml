name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          filename: github-metrics.svg
          
          # 1. ТВОЙ 3D ГОРОД
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # 2. ТВОИ СКИЛЛЫ (C#, UNITY, SHADERS)
          plugin_languages: yes
          plugin_languages_ignored: html, css, makefile # Игнорируем лишнее
          plugin_languages_details: percentage, lines   # Показываем проценты и строки кода
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          plugin_languages_indepth: yes                # Глубокий анализ всех репозиториев
          
          # НАСТРОЙКИ СТИЛЯ (ТЁМНЫЙ)
          template: classic
          config_timezone: Europe/Moscow
          config_display: large
          base_indepth: yes
          
          # ПОРЯДОК ОТОБРАЖЕНИЯ: Сначала город, под ним — языки
          config_order: isocalendar, languages
          
          # ТВОИ ЦВЕТА (Черный фон и желтый акцент)
          config_colors: "000000, #161b22, #30363d, #8b949e, #f3e600"
            section { background-color: #000000; }
            svg { background-color: #000000; }
