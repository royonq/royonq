name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          base: "header, activity, community"
          filename: github-metrics.svg
          
          # 1. ТВОЙ 3D ГОРОД
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # 2. ТВОИ СКИЛЛЫ (C#, UNITY)
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          
          # НАСТРОЙКИ ДЛЯ АНАЛИЗА ЧУЖИХ ПРОЕКТОВ
          repositories_affiliations: owner, collaborator, contributor
          plugin_languages_analysis_timeout: 60
          plugin_languages_categories: programming
          plugin_languages_recent_load: 1000
          plugin_languages_recent_days: 365
          
          # НАСТРОЙКИ СТИЛЯ
          template: classic
          config_timezone: Europe/Moscow
          config_display: large
          config_order: isocalendar, languages
          # Твоя темная палитра с желтым акцентом
          config_colors: "000000, #161b22, #30363d, #8b949e, #f3e600"
