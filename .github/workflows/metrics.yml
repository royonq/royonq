name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          # Убираем папку, сохраняем прямо в корень для легкого доступа
          filename: github-metrics.svg
          
          # 3D Календарь (Тот самый город)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # Твои скиллы (Языки программирования)
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          
          # Настройки стиля под твой скриншот
          config_timezone: Europe/Moscow
          config_display: large
          config_padding: 0, 5
          template: classic
          base_indepth: yes
          config_order: isocalendar, languages
          # Темная палитра (черный фон и серые столбики)
          config_colors: "0d1117, #21262d, #30363d, #484f58, #8b949e"
