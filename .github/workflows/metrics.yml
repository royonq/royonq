name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          filename: github-metrics.svg
          
          # 3D Календарь
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # Языки (Скиллы)
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          
          # Настройки стиля
          config_timezone: Europe/Moscow
          config_display: large
          config_padding: 0, 5
          template: classic
          base_indepth: yes
          config_order: isocalendar, languages

          # ТЕМНАЯ ПАЛИТРА:
          # 1. #000000 — абсолютно черный фон
          # 2-4. Оттенки серого для средних коммитов
          # 5. #f3e600 — желтый (как в твоем заголовке) для пиков активности
          config_colors: "#000000, #161b22, #30363d, #8b949e, #f3e600"
