name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Обновлять каждый день в полночь
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Europe/Moscow
          # Настройки стиля:
          config_display: large
          config_padding: 0, 5
          design_title_color: "#30363d"
          template: classic
          base_indepth: yes
          # Цвета под твой темный стиль:
          config_order: isocalendar
